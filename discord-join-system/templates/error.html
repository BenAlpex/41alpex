<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            padding: 20px;
        }
        .container {
            background: #2C2F33;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            color: #fff;
        }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .error-box {
            background: #ED424520;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .error-box .title { color: #ED4245; font-size: 18px; font-weight: 600; }
        .error-box .detail { color: #99AAB5; font-size: 14px; margin-top: 5px; }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover { background: #4752C4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">❌</div>
        <h1>Hata Oluştu</h1>
        <div class="error-box">
            <div class="title">{{ hata }}</div>
            <div class="detail">{{ detay }}</div>
        </div>
        <a href="/" class="btn">🏠 Ana Sayfa</a>
    </div>
</body>
</html>
