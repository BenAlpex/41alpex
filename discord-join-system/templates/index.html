<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yetkilendir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            padding: 20px;
        }
        .container {
            background: #2C2F33;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            color: #fff;
        }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #99AAB5; font-size: 15px; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover { background: #4752C4; transform: translateY(-2px); }
        .footer {
            margin-top: 20px;
            color: #6D7A8A;
            font-size: 13px;
        }
        .footer a { color: #5865F2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖</div>
        <h1>Yetkilendir</h1>
        <p>
            Discord hesabını onaylayarak<br>
            botun seni sunucuya eklemesine izin ver
        </p>
        <a href="/login" class="btn">🔷 Discord ile Giriş Yap</a>
        <div class="footer">
            <a href="/admin">Admin Paneli</a>
        </div>
    </div>
</body>
</html>
