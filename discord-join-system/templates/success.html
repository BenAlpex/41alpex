<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarılı!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            padding: 20px;
        }
        .container {
            background: #2C2F33;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            color: #fff;
        }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .sub { color: #99AAB5; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        .user-box {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .user-box .name { font-size: 18px; font-weight: 600; }
        .user-box .id { color: #6D7A8A; font-size: 13px; margin-top: 4px; }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover { background: #4752C4; }
        .footer {
            margin-top: 20px;
            color: #6D7A8A;
            font-size: 13px;
        }
        .footer a { color: #5865F2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Başarılı!</h1>
        <div class="sub">Hesabın başarıyla yetkilendirildi!</div>
        <div class="user-box">
            <div class="name">{{ username }}</div>
            <div class="id">ID: {{ user_id }}</div>
        </div>
        <a href="/" class="btn">🏠 Ana Sayfa</a>
        <div class="footer">
            <a href="https://discord.com/settings/authorized" target="_blank">Discord Ayarları</a>
        </div>
    </div>
</body>
</html>
